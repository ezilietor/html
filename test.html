<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>La Gran Comisión — Citas Bíblicas</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Cinzel:wght@400;600;700&family=Lato:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c97a;
      --gold-dim: #7a5f25;
      --navy: #0a0f1e;
      --navy-mid: #121b33;
      --navy-light: #1c2a4a;
      --cream: #f5ede0;
      --cream-dim: #d6c8b2;
      --white: #ffffff;
      --transition: all 0.4s cubic-bezier(0.165, 0.84, 0.44, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }

    body {
      background-color: var(--navy);
      color: var(--cream);
      font-family: 'Lato', sans-serif;
      font-weight: 300;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* Barra de progreso */
    #progress-bar {
      position: fixed; top: 0; left: 0; width: 0%; height: 3px;
      background: var(--gold); z-index: 1000; transition: width 0.1s;
    }

    /* Fondo de Estrellas Refinado */
    .stars { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
    .stars span {
      position: absolute; border-radius: 50%; background: var(--gold-light);
      opacity: 0; animation: twinkle var(--dur, 4s) ease-in-out infinite;
    }
    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.5); }
      50% { opacity: var(--op, 0.4); transform: scale(1); }
    }

    /* HERO */
    .hero {
      position: relative; z-index: 1; min-height: 100vh;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center; padding: 60px 24px;
      background: radial-gradient(circle at center, #1a2d5a 0%, var(--navy) 100%);
    }

    .hero-subtitle {
      font-family: 'Cinzel', serif; font-size: clamp(0.7rem, 2vw, 0.9rem);
      letter-spacing: 0.5em; color: var(--gold); text-transform: uppercase;
      margin-bottom: 20px; opacity: 0; animation: fadeUp 1s ease forwards 0.3s;
    }

    .hero-title {
      font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 10vw, 8rem);
      font-weight: 300; line-height: 0.9; color: var(--white);
      margin-bottom: 30px; opacity: 0; animation: fadeUp 1s ease forwards 0.6s;
    }

    .hero-title em { font-style: italic; color: var(--gold-light); font-weight: 400; }

    .hero-desc {
      max-width: 600px; font-size: 1.1rem; color: var(--cream-dim);
      margin-bottom: 40px; opacity: 0; animation: fadeUp 1s ease forwards 0.9s;
    }

    /* BOTONES FILTRO */
    .filter-bar {
      display: flex; justify-content: center; flex-wrap: wrap;
      gap: 12px; margin: 40px 0; z-index: 10; position: relative;
    }

    .filter-btn {
      font-family: 'Cinzel', serif; font-size: 0.65rem; letter-spacing: 0.2em;
      background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.3);
      color: var(--gold); padding: 10px 22px; cursor: pointer;
      transition: var(--transition); border-radius: 50px;
    }

    .filter-btn:hover, .filter-btn.active {
      background: var(--gold); color: var(--navy); transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(201,168,76,0.3);
    }

    /* GRID Y TARJETAS */
    .quotes-section { max-width: 1200px; margin: 0 auto; padding: 0 24px 100px; position: relative; z-index: 1; }

    .quotes-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 30px; transition: all 0.5s ease;
    }

    .quote-card {
      background: rgba(18, 27, 51, 0.6);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(201,168,76,0.15);
      padding: 45px 35px; position: relative; display: flex; flex-direction: column;
      transition: var(--transition); opacity: 0; transform: translateY(20px);
    }

    .quote-card.visible { opacity: 1; transform: translateY(0); }

    .quote-card:hover {
      border-color: var(--gold); transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.4);
    }

    .quote-text {
      font-family: 'Cormorant Garamond', serif; font-size: 1.3rem;
      font-style: italic; color: var(--white); margin-bottom: 25px;
      position: relative; line-height: 1.6;
    }

    .quote-ref {
      font-family: 'Cinzel', serif; font-size: 0.75rem;
      color: var(--gold); letter-spacing: 0.2em; margin-top: auto;
    }

    /* Acciones de la tarjeta */
    .card-actions {
      margin-top: 20px; display: flex; gap: 15px; opacity: 0;
      transition: var(--transition);
    }
    .quote-card:hover .card-actions { opacity: 1; }

    .action-btn {
      background: none; border: none; color: var(--gold-dim);
      cursor: pointer; font-size: 0.8rem; transition: color 0.3s;
      display: flex; align-items: center; gap: 5px;
    }
    .action-btn:hover { color: var(--gold-light); }

    /* FOOTER */
    footer {
      padding: 80px 24px; text-align: center; background: rgba(5, 8, 18, 1);
      border-top: 1px solid rgba(201,168,76,0.1); position: relative; z-index: 1;
    }

    .back-to-top {
      position: fixed; bottom: 30px; right: 30px; background: var(--gold);
      width: 45px; height: 45px; border-radius: 50%; display: flex;
      align-items: center; justify-content: center; color: var(--navy);
      text-decoration: none; opacity: 0; visibility: hidden;
      transition: var(--transition); z-index: 100;
    }
    .back-to-top.show { opacity: 1; visibility: visible; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @media (max-width: 768px) {
      .hero-title { font-size: 4rem; }
      .quotes-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div id="progress-bar"></div>

  <div class="stars" id="stars"></div>

  <section class="hero">
    <p class="hero-subtitle">La Palabra que Transforma</p>
    <h1 class="hero-title">La Gran<br/><em>Comisión</em></h1>
    <p class="hero-desc">
      Un compendio de sabiduría bíblica para inspirar la misión de llevar esperanza a cada rincón de la tierra.
    </p>
    <div class="scroll-cta" onclick="window.scrollTo({top: window.innerHeight, behavior:'smooth'})">
      <div style="width: 1px; height: 60px; background: linear-gradient(var(--gold), transparent); margin: 0 auto;"></div>
    </div>
  </section>

  <section class="quotes-section">
    <div class="filter-bar" id="filterBar">
      <button class="filter-btn active" data-filter="all">Todas las promesas</button>
      <button class="filter-btn" data-filter="mision">Misión</button>
      <button class="filter-btn" data-filter="salvacion">Salvación</button>
      <button class="filter-btn" data-filter="poder">Poder</button>
      <button class="filter-btn" data-filter="fruto">Fruto</button>
    </div>

    <div class="quotes-grid" id="quotesGrid"></div>
  </section>

  <footer>
    <p style="font-family: 'Cinzel'; color: var(--gold); letter-spacing: 2px; margin-bottom: 10px;">Evangelismo Bíblico</p>
    <p style="font-style: italic; color: var(--cream-dim);">"Haced todo para la gloria de Dios"</p>
  </footer>

  <a href="#" class="back-to-top" id="backToTop">↑</a>

  <script>
    // Generar estrellas
    const starsEl = document.getElementById('stars');
    for (let i = 0; i < 100; i++) {
      const s = document.createElement('span');
      const size = Math.random() * 2 + 1;
      s.style.cssText = `
        width:${size}px; height:${size}px;
        top:${Math.random()*100}%; left:${Math.random()*100}%;
        --dur:${3 + Math.random()*4}s;
        --op:${0.1 + Math.random()*0.5};
      `;
      starsEl.appendChild(s);
    }

    const quotes = [
      { text: "Id, y haced discípulos a todas las naciones, bautizándolos en el nombre del Padre, y del Hijo, y del Espíritu Santo.", ref: "Mateo 28:19", cat: "mision" },
      { text: "Porque de tal manera amó Dios al mundo, que ha dado a su Hijo unigénito, para que todo aquel que en él cree, no se pierda, mas tenga vida eterna.", ref: "Juan 3:16", cat: "salvacion" },
      { text: "Recibiréis poder, cuando haya venido sobre vosotros el Espíritu Santo, y me seréis testigos hasta lo último de la tierra.", ref: "Hechos 1:8", cat: "poder" },
      { text: "¿Cómo, pues, invocarán a aquel en el cual no han creído? ¿Y cómo oirán sin haber quien les predique?", ref: "Romanos 10:14", cat: "mision" },
      { text: "No me avergüenzo del evangelio, porque es poder de Dios para salvación a todo aquel que cree.", ref: "Romanos 1:16", cat: "poder" },
      { text: "La mies es mucha, mas los obreros pocos; rogad, pues, al Señor de la mies, que envíe obreros a su mies.", ref: "Lucas 10:2", cat: "mision" },
      { text: "El fruto del justo es árbol de vida; y el que gana almas es sabio.", ref: "Proverbios 11:30", cat: "fruto" },
      { text: "Así que la fe es por el oír, y el oír, por la palabra de Dios.", ref: "Romanos 10:17", cat: "poder" },
      { text: "Los que sembraron con lágrimas, con regocijo segarán.", ref: "Salmos 126:5", cat: "fruto" }
    ];

    function renderCards(filter = 'all') {
      const grid = document.getElementById('quotesGrid');
      grid.style.opacity = '0';
      
      setTimeout(() => {
        grid.innerHTML = '';
        const filtered = filter === 'all' ? quotes : quotes.filter(q => q.cat === filter);
        
        filtered.forEach((q, i) => {
          const card = document.createElement('div');
          card.className = 'quote-card';
          card.innerHTML = `
            <p class="quote-text">"${q.text}"</p>
            <div class="quote-ref">${q.ref}</div>
            <div class="card-actions">
              <button class="action-btn" onclick="copyQuote('${q.text} ${q.ref}')">📋 Copiar</button>
              <button class="action-btn" onclick="shareQuote('${q.ref}')">🔗 Compartir</button>
            </div>
          `;
          grid.appendChild(card);
          setTimeout(() => card.classList.add('visible'), i * 100);
        });
        grid.style.opacity = '1';
      }, 300);
    }

    // Copiar al portapapeles
    function copyQuote(text) {
      navigator.clipboard.writeText(text);
      alert("Cita copiada con éxito");
    }

    // Compartir (Web Share API)
    function shareQuote(ref) {
      if (navigator.share) {
        navigator.share({ title: 'Cita Bíblica', text: ref, url: window.location.href });
      } else {
        alert("Enlace listo para compartir: " + window.location.href);
      }
    }

    // Barra de progreso y botón volver arriba
    window.onscroll = function() {
      const winScroll = document.body.scrollTop || document.documentElement.scrollTop;
      const height = document.documentElement.scrollHeight - document.documentElement.clientHeight;
      const scrolled = (winScroll / height) * 100;
      document.getElementById("progress-bar").style.width = scrolled + "%";

      const btt = document.getElementById("backToTop");
      if (winScroll > 500) btt.classList.add("show");
      else btt.classList.remove("show");
    };

    // Eventos de Filtro
    document.querySelectorAll('.filter-btn').forEach(btn => {
      btn.onclick = () => {
        document.querySelector('.filter-btn.active').classList.remove('active');
        btn.classList.add('active');
        renderCards(btn.dataset.filter);
      };
    });

    // Carga inicial
    renderCards();
  </script>
</body>
</html>
